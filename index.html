<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin Fashion</title>
    <!-- tailwind css -->
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">

</head>
<body>
    <header class="bg-yellow-100">
        <section class="container md:flex items-center justify-around py-12 px-4">
            <div class="space-y-4">
                <h1 class="text-7xl font-bold uppercase"><span class="text-yellow-400">Be the Penguins</span> <br> <span
                        class="text-gray-800">of Winter</span></h1>
                <p class="w-2/3">Lorem Ipsum is simply dummy text of the printing
                    and typesetting industry.</p>
                <button class="text-white uppercase px-7 py-4 bg-green-500 rounded-xl font-medium bg-gradient-to-r from-indigo-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg> Buy Now</button>
            </div>
            <div>
                <img src="images/model.png" alt="" srcset="">
            </div>
        </section>
    </header>
    <main>
        <!-- women jacket section-->
        <section class="container px-8 mx-auto">
            <h2 class="text-3xl uppercase text-gray-800 font-bold">Woman Jacket</h2>
            <!-- women jacket container -->
            <div class="grid grid-cols-3 gap-7">
                <div class="shadow-lg rounded-2xl">
                    <img src="images/jacket-1.png" alt="" srcset="">
                </div>
                <div>
                    <img src="images/jacket-2.png" alt="" srcset="">
                </div>
                <div>
                    <img src="images/jacket-3.png" alt="" srcset="">
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
